<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.P.A.W.N. // SURVIVAL COORDINATION NETWORK</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/nav.css">
    <link rel="stylesheet" href="css/components.css">

    <link rel="stylesheet" href="css/pages/dashboard.css">
</head>
<body>

<div id="boot-screen">
  <div class="boot-logo">S.P.A.W.N.</div>
  <div class="boot-subtitle">SURVIVAL · PROTOCOL · ALERT · WATCH · NETWORK</div>
  <div class="boot-log" id="boot-log"></div>
  <div class="boot-bar-wrap"><div class="boot-bar" id="boot-bar"></div></div>
</div>

<div id="auth-overlay" style="display:none">
  <div class="auth-box">
    <div class="auth-title">S.P.A.W.N.</div>
    <div class="auth-sub">IDENTIFY YOURSELF, SURVIVOR</div>
    <div id="auth-form">
        </div>
  </div>
</div>

<div id="app" style="display:none">
  <nav>
    <div class="nav-logo">S.P.A.W.N.</div>
    <div class="nav-links">
      <a href="index.html" class="nav-btn active">HOME BASE</a>
      <a href="map.html" class="nav-btn">MAP CONSOLE</a>
      <a href="trade.html" class="nav-btn">TRADE POST</a>
      <a href="comms.html" class="nav-btn">COMMS</a>
      <a href="admin.html" class="nav-btn">ADMIN</a>
    </div>
    <div class="nav-status">
      <div class="pulse-dot"></div>
      <span id="nav-user">AUTHENTICATING...</span>
    </div>
  </nav>

  <div id="alert-bar">
    ⚡ ADMIN BROADCAST: <span id="admin-msg-display">System scanning for survivors...</span>
  </div>

  <main class="dashboard-grid">
    <div class="card">
        <div class="card-title">SURVIVOR STATUS</div>
        <div class="stat-val" id="qs-survivors">0</div>
        <div class="stat-label">REGISTERED USERS</div>
    </div>
    <div class="card">
        <div class="card-title">MARKETPLACE</div>
        <div class="stat-val" id="qs-trades">0</div>
        <div class="stat-label">ACTIVE TRADES</div>
    </div>
    <div class="card">
        <div class="card-title">THREAT LEVEL</div>
        <div id="threat-display">
            </div>
    </div>
  </main>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
