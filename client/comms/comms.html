<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat - S.P.A.W.N</title>

    <!-- Fonts and CSS -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/nav.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/pages/comms.css">

    </head>
    <body>
    <div id="app">
        <nav>
            <a href="/index.html" class="nav-logo nav-logo-link">S.P.A.W.N.</a>
            <div class="nav-links">
                <a href="/index.html" class="nav-btn">HOME BASE</a>
                <a href="/map/map.html" class="nav-btn">MAP CONSOLE</a>
                <a href="/trade/trade.html" class="nav-btn">TRADE POST</a>
                <a href="/comms/comms.html" class="nav-btn active">COMMS</a>
                <a href="/admin/admin.html" class="nav-btn">ADMIN</a>
            </div>
            <div class="nav-status">
                <div class="pulse-dot"></div>
                <button id="nav-user-btn" class="nav-user-btn">AUTHENTICATING...</button>
                <div id="nav-user-menu" class="nav-user-menu">
                    <button data-action="change-location">Change Location</button>
                    <button data-action="my-trades">My Trade Listings</button>
                    <button data-action="logout">Log Out</button>
                </div>
            </div>
        </nav>

        <main class="panel active">
            <div class="panel-header">COMMS — ENCRYPTED CHANNEL</div>
            
            <div class="chat-wrapper">
                <div class="chat-main">
                    <div class="chat-header">
                        <div class="pulse-dot"></div>
                        CHANNEL ALPHA // OPEN FREQUENCY
                    </div>
                    <div class="chat-messages" id="chat-messages"></div>
                    
                    <div class="chat-input-area">
                        <input class="chat-input" id="chat-input" placeholder="transmit message..." onkeydown="if(event.key==='Enter')sendMsg()">
                        <button class="chat-send" onclick="sendMsg()">SEND ›</button>
                    </div>
                </div>

                <div class="online-list">
                    <div class="online-title">ONLINE SURVIVORS</div>
                    <div class="online-users" id="online-users"></div>
                    <button class="spawn-btn" style="width:100%; margin-top:auto; background:var(--rust)" onclick="triggerSOS()">🚨 SEND SOS</button>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/config.js"></script>
    <script>
        // Conditionally load socket.io client only when sockets are enabled in CONFIG
        (function(){
            function loadSocketIo() {
                const s = document.createElement('script');
                s.src = 'https://cdn.socket.io/4.7.2/socket.io.min.js';
                s.async = true;
                s.onload = function(){ console.log('Socket.IO client loaded'); };
                document.body.appendChild(s);
            }

            // Wait for CONFIG to be available
            const waitForConfig = () => {
                if (window.CONFIG) {
                    if (CONFIG.ENABLE_SOCKETS) loadSocketIo();
                    else console.info('Sockets disabled by CONFIG.ENABLE_SOCKETS');
                } else setTimeout(waitForConfig, 50);
            };
            waitForConfig();
        })();
    </script>
    <script src="/js/auth.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/comms/comms.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof initNavProfile === 'function') initNavProfile();
        });
    </script>
    </body>
</html>
