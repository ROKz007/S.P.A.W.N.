<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat - S.P.A.W.N</title>

    <!-- Link to external CSS for styling -->
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/nav.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/pages/comms.css">

    </head>
    <body>
    <div id="app">
        <nav>
            <div class="nav-logo">S.P.A.W.N.</div>
            <div class="nav-links">
                <a href="/index.html" class="nav-btn">HOME BASE</a>
                <a href="/map/map.html" class="nav-btn">MAP CONSOLE</a>
                <a href="/trade/trade.html" class="nav-btn">TRADE POST</a>
                <a href="/comms/comms.html" class="nav-btn active">COMMS</a>
                <a href="/admin/admin.html" class="nav-btn">ADMIN</a>
            </div>
            <div class="nav-status">
                <div class="pulse-dot"></div>
                <span id="nav-user">AUTHENTICATING...</span>
            </div>
        </nav>

        <main class="panel active">
            <div class="panel-header">COMMS — ENCRYPTED CHANNEL</div>
            
            <div class="chat-wrapper">
                <div class="chat-main">
                    <div class="chat-header">
                        <div class="pulse-dot"></div>
                        CHANNEL ALPHA // OPEN FREQUENCY
                    </div>
                    <div class="chat-messages" id="chat-messages"></div>
                    
                    <div class="chat-input-area">
                        <input class="chat-input" id="chat-input" placeholder="transmit message..." onkeydown="if(event.key==='Enter')sendMsg()">
                        <button class="chat-send" onclick="sendMsg()">SEND ›</button>
                    </div>
                </div>

                <div class="online-list">
                    <div class="online-title">ONLINE SURVIVORS</div>
                    <div class="online-users" id="online-users"></div>
                    <button class="spawn-btn" style="width:100%; margin-top:auto; background:var(--rust)" onclick="triggerSOS()">🚨 SEND SOS</button>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/config.js"></script>
    <script>
        // Conditionally load socket.io client only when sockets are enabled in CONFIG
        (function(){
            function loadSocketIo() {
                const s = document.createElement('script');
                s.src = 'https://cdn.socket.io/4.7.2/socket.io.min.js';
                s.async = true;
                s.onload = function(){ console.log('Socket.IO client loaded'); };
                document.body.appendChild(s);
            }

            // Wait for CONFIG to be available
            const waitForConfig = () => {
                if (window.CONFIG) {
                    if (CONFIG.ENABLE_SOCKETS) loadSocketIo();
                    else console.info('Sockets disabled by CONFIG.ENABLE_SOCKETS');
                } else setTimeout(waitForConfig, 50);
            };
            waitForConfig();
        })();
    </script>
    <script>
        // Display user callsign once config loads
        setTimeout(() => {
            const user = sessionStorage.getItem(CONFIG.USER_KEY);
            if (user) {
                try {
                    const userData = JSON.parse(user);
                    const navUser = document.getElementById('nav-user');
                    if (navUser) navUser.textContent = userData.callsign;
                } catch (e) {}
            }
        }, 50);
    </script>
    <script src="/js/auth.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/comms/comms.js"></script>
    </body>
</html>
