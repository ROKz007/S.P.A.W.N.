<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Page</title>

    <!-- Fonts and CSS -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/nav.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/pages/trade.css">

</head>
<body>
    <div id="app">
        <nav>
            <a href="/index.html" class="nav-logo nav-logo-link">S.P.A.W.N.</a>
            <div class="nav-links">
                <a href="/index.html" class="nav-btn">HOME BASE</a>
                <a href="/map/map.html" class="nav-btn">MAP CONSOLE</a>
                <a href="/trade/trade.html" class="nav-btn active">TRADE POST</a>
                <a href="/comms/comms.html" class="nav-btn">COMMS</a>
                <a href="/admin/admin.html" class="nav-btn">ADMIN</a>
            </div>
            <div class="nav-status">
                <div class="pulse-dot"></div>
                <button id="nav-user-btn" class="nav-user-btn">AUTHENTICATING...</button>
                <div id="nav-user-menu" class="nav-user-menu">
                    <button data-action="change-location">Change Location</button>
                    <button data-action="my-trades">My Trade Listings</button>
                    <button data-action="logout">Log Out</button>
                </div>
            </div>
        </nav>

        <main class="panel active">
            <div class="panel-header">TRADE POST — BARTER EXCHANGE</div>
            
            <div class="trade-tabs">
                <button class="trade-tab active" onclick="filterTrades('all', event)">ALL ITEMS</button>
                    <button class="trade-tab" onclick="filterTrades('medical', event)">MEDICAL</button>
                    <button class="trade-tab" onclick="filterTrades('supplies', event)">SUPPLIES</button>
                    <button class="trade-tab" onclick="filterTrades('apparel', event)">APPAREL</button>
                    <button class="trade-tab" onclick="filterTrades('equipment', event)">EQUIPMENT</button>
            </div>

            <div class="trade-grid" id="trade-grid"></div>

            <section class="spawn-form">
                <div class="form-title">// POST A TRADE OFFER</div>
                <div class="form-grid">
                    <div class="form-group"><label>ITEM NAME</label><input id="t-name"></div>
                    <div class="form-group">
                        <label>CATEGORY</label>
                        <select id="t-cat">
                            <option value="medical">Medical</option>
                            <option value="supplies">Supplies</option>
                            <option value="apparel">Apparel</option>
                            <option value="equipment">Equipment</option>
                        </select>
                    </div>
                    <div class="form-group full"><label>TERMS</label><textarea id="t-desc"></textarea></div>
                    <div class="form-group"><label>CONTACT/FREQ</label><input id="t-contact"></div>
                    <div class="form-group"><label>LOCATION</label><input id="t-loc"></div>
                </div>
                <button class="spawn-btn" onclick="postTrade()">BROADCAST TRADE ›</button>
            </section>
        </main>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/trade/trade.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof initNavProfile === 'function') initNavProfile();
        });
    </script>
</body>
</html>
