<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odisha Heatmap</title>

    <!-- Fonts and CSS -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/nav.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/pages/map.css">

</head>
<body>
    <div id="app">
        <nav>
            <div class="nav-logo">S.P.A.W.N.</div>
            <div class="nav-links">
                <a href="/index.html" class="nav-btn">HOME BASE</a>
                <a href="/map/map.html" class="nav-btn active">MAP CONSOLE</a>
                <a href="/trade/trade.html" class="nav-btn">TRADE POST</a>
                <a href="/comms/comms.html" class="nav-btn">COMMS</a>
                <a href="/admin/admin.html" class="nav-btn">ADMIN</a>
            </div>
            <div class="nav-status">
                <div class="pulse-dot"></div>
                <span id="nav-user">AUTHENTICATING...</span>
            </div>
        </nav>
        <div id="map-canvas">
            <div class="map-grid"></div> </div>
        
        <div class="map-legend">
            <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div><span>LOW</span></div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div><span>MID</span></div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--rust-bright)"></div><span>HIGH</span></div>
        </div>
    </div>
    <script src="/js/config.js"></script>
    <script>
        // Display user callsign once config loads
        setTimeout(() => {
            const user = sessionStorage.getItem(CONFIG.USER_KEY);
            if (user) {
                try {
                    const userData = JSON.parse(user);
                    const navUser = document.getElementById('nav-user');
                    if (navUser) navUser.textContent = userData.callsign;
                } catch (e) {}
            }
        }, 50);
    </script>
    <script src="/js/auth.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/map/map.js"></script>
    <script>
        // Map API loader: set CONFIG.MAP_API_SCRIPT_URL in client/js/config.js
        (function(){
            const url = CONFIG.MAP_API_SCRIPT_URL;
            if (url && url.length) {
                const s = document.createElement('script');
                // Many providers support a callback query param; append callback only if not present
                const callbackParam = url.includes('?') ? '&callback=initMap' : '?callback=initMap';
                s.src = url + callbackParam;
                s.async = true; s.defer = true;
                document.body.appendChild(s);
                return;
            }

            // No external MAP API configured — load Leaflet + leaflet-heat plugin by default
            const leafletCss = document.createElement('link');
            leafletCss.rel = 'stylesheet';
            leafletCss.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
            document.head.appendChild(leafletCss);

            function loadScript(src, onload) {
                const s = document.createElement('script');
                s.src = src;
                s.async = true;
                s.defer = true;
                s.onload = onload;
                s.onerror = function(){ console.error('Failed to load', src); };
                document.body.appendChild(s);
            }

            // Load Leaflet, then the heat plugin, then call initMap
            loadScript('https://unpkg.com/leaflet@1.9.4/dist/leaflet.js', function(){
                loadScript('https://unpkg.com/leaflet.heat/dist/leaflet-heat.js', function(){
                    if (typeof window.initMap === 'function') {
                        try { window.initMap(); } catch (e) { console.error('initMap error', e); }
                    }
                });
            });
        })();
    </script>
</body>
</html>
