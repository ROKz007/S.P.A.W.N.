<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odisha Heatmap</title>

    <!-- Link to external CSS for styling -->
    <link rel="stylesheet" href="/client/css/global.css">
    <link rel="stylesheet" href="/client/css/animations.css">
    <link rel="stylesheet" href="/client/css/nav.css">
    <link rel="stylesheet" href="/client/css/components.css">
    <link rel="stylesheet" href="/client/css/pages/map.css">

</head>
<body>
    <div id="app">
        <nav>
            <div class="nav-logo">S.P.A.W.N.</div>
            <div class="nav-links">
                <a href="/client/index.html" class="nav-btn">HOME BASE</a>
                <a href="/client/map/map.html" class="nav-btn active">MAP CONSOLE</a>
                <a href="/client/trade/trade.html" class="nav-btn">TRADE POST</a>
                <a href="/client/comms/comms.html" class="nav-btn">COMMS</a>
                <a href="/client/admin/admin.html" class="nav-btn">ADMIN</a>
            </div>
            <div class="nav-status">
                <div class="pulse-dot"></div>
                <span id="nav-user">AUTHENTICATING...</span>
            </div>
        </nav>
        <div id="map-canvas">
            <div class="map-grid"></div> </div>
        
        <div class="map-legend">
            <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div><span>LOW</span></div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div><span>MID</span></div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--rust-bright)"></div><span>HIGH</span></div>
        </div>
    </div>
    <script src="/client/js/config.js"></script>
    <script src="/client/js/auth.js"></script>
    <script src="/client/js/api.js"></script>
    <script src="/client/js/utils.js"></script>
    <script src="/client/map/map.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDQdaiYnVg_0Lb7dJP35MVQp_EVEoOvFPk&libraries=visualization&callback=initMap" async defer></script>
</body>
</html>
