<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Admin Console</title>
        
        <!-- Link to external CSS for styling -->
        <link rel="stylesheet" href="/css/global.css">
        <link rel="stylesheet" href="/css/animations.css">
        <link rel="stylesheet" href="/css/nav.css">
        <link rel="stylesheet" href="/css/components.css">
        <link rel="stylesheet" href="/css/pages/admin.css">

    </head>
    <body>
        <div id="app">
            <nav>
                <div class="nav-logo">S.P.A.W.N.</div>
                <div class="nav-links">
                    <a href="/index.html" class="nav-btn">HOME BASE</a>
                    <a href="/map/map.html" class="nav-btn">MAP CONSOLE</a>
                    <a href="/trade/trade.html" class="nav-btn">TRADE POST</a>
                    <a href="/comms/comms.html" class="nav-btn">COMMS</a>
                    <a href="/admin/admin.html" class="nav-btn active">ADMIN</a>
                </div>
                <div class="nav-status">
                    <div class="pulse-dot"></div>
                    <span id="nav-user">AUTHENTICATING...</span>
                </div>
            </nav>

            <main class="panel active">
                <div class="panel-header">ADMIN CONSOLE — RESTRICTED ACCESS</div>
                
                <div class="admin-grid">
                    <section class="admin-card">
                        <div class="admin-section-title">BROADCAST MESSAGE</div>
                        <div class="form-group">
                            <label>MESSAGE CONTENT</label>
                            <textarea id="admin-msg-input" rows="3" placeholder="Enter global broadcast..."></textarea>
                        </div>
                        <button class="spawn-btn" onclick="broadcastMsg()">BROADCAST ›</button>
                    </section>

                    <section class="admin-card">
                        <div class="admin-section-title">INJECT THREAT DATA</div>
                        <div class="form-group">
                            <label>SELECT CITY</label>
                            <select id="admin-city">
                                <option value="Bhubaneswar">Bhubaneswar</option>
                                <option value="Cuttack">Cuttack</option>
                                <option value="Rourkela">Rourkela</option>
                                <option value="Puri">Puri</option>
                                <option value="Sambalpur">Sambalpur</option>
                            </select>
                        </div>
                        <div>
                            <label>INTENSITY LEVEL</label>
                            <input type="range" class="intensity-slider" id="admin-intensity" min="0" max="1" step="0.01" value="0.5" 
                                oninput="document.getElementById('intensity-val').textContent=parseFloat(this.value).toFixed(2)">
                            <div class="intensity-val" id="intensity-val">0.50</div>
                        </div>
                        <button class="spawn-btn" onclick="injectData()">INJECT DATA ›</button>
                        
                        <div class="city-log" id="city-log"></div>
                    </section>
                </div>
            </main>
        </div>

    <script src="/js/config.js"></script>
    <script>
        // Display user callsign once config loads
        setTimeout(() => {
            const user = sessionStorage.getItem(CONFIG.USER_KEY);
            if (user) {
                try {
                    const userData = JSON.parse(user);
                    const navUser = document.getElementById('nav-user');
                    if (navUser) navUser.textContent = userData.callsign;
                } catch (e) {}
            }
        }, 50);
    </script>
    <script src="/js/auth.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/admin/admin.js"></script>
    </body>
</html>
